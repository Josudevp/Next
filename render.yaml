services:
  # 1. EL CEREBRO (BACKEND)
  - type: web
    name: next-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: apt-get install -y --no-install-recommends libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 libx11-xcb1 && npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://next-col.online
      - key: PASSWORD_RESET_FRONTEND_URL
        value: https://next-col.online
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: BREVO_API_KEY
        sync: false

  # 2. LA CARA (FRONTEND)
  - type: web
    name: next-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      # JS/CSS/images — content-hashed filenames → safe to cache forever
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # HTML entry point — NEVER cache; must always fetch the latest version
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://next-backend-i6el.onrender.com