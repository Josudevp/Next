################################################################
# render.yaml — NEXT Project (IUB Edition)
################################################################

services:
  # 1. BACKEND — Web Service (Node.js)
  - type: web
    name: next-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false           # Configura la URI de Aiven en el Dashboard
      - key: GEMINI_API_KEY
        sync: false           # Tu clave de pago de Google Cloud
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        fromStaticSite:       # <--- CAMBIO CLAVE: Referencia correcta
          name: next-frontend
          property: url

staticSites:                  # <--- CATEGORÍA RAÍZ CORRECTA
  # 2. FRONTEND — Static Site (React / Vite)
  - name: next-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://next-ryjd.onrender.com/api