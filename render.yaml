services:
  # 1. EL CEREBRO (BACKEND)
  - type: web
    name: next-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: next-frontend
          type: web
          property: host

  # 2. LA CARA (FRONTEND)
  - type: web
    name: next-frontend
    runtime: static
    # ❌ SIN REGION AQUÍ PARA QUE NO FALLE
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://next-frontend-i0yt.onrender.com/api